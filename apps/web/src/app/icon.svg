<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ShowcaseIt">
  <title>ShowcaseIt</title>
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Sound waves — same idea as classic mic + broadcast arcs; reads at 16px -->
  <path d="M10 11 Q4.5 16 10 21" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <path d="M10 8 Q2.5 16 10 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.88"/>
  <path d="M22 11 Q27.5 16 22 21" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 8 Q29.5 16 22 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.88"/>
  <!-- Studio mic: capsule + U cradle -->
  <rect x="12.5" y="7" width="7" height="10" rx="3.5" fill="#f1f5f9"/>
  <line x1="14" y1="10" x2="18" y2="10" stroke="#64748b" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="14" y1="12.5" x2="18" y2="12.5" stroke="#64748b" stroke-width="0.85" stroke-linecap="round"/>
  <line x1="14" y1="15" x2="18" y2="15" stroke="#64748b" stroke-width="0.85" stroke-linecap="round"/>
  <path
    d="M11.5 18.5c0 2.4 2 4.3 4.5 4.3s4.5-1.9 4.5-4.3"
    fill="none"
    stroke="#cbd5e1"
    stroke-width="1.8"
    stroke-linecap="round"
  />
  <line x1="16" y1="22.8" x2="16" y2="26" stroke="#cbd5e1" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="26" x2="20" y2="26" stroke="#cbd5e1" stroke-width="1.8" stroke-linecap="round"/>
</svg>
